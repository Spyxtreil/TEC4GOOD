name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy adhd_activity_planner.py main.py || true
        # mypy is informational for now — remove "|| true" once strict mode passes.

      - name: Run tests
        run: pytest -q

  arduino-lint:
    name: Arduino lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install arduino-lint
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-lint/main/etc/install.sh | sh
          echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Lint sketches
        run: |
          for sketch in pulso_simple.ino sensooooor2.ino; do
            dir=$(mktemp -d)
            name=$(basename "$sketch" .ino)
            mkdir -p "$dir/$name"
            cp "$sketch" "$dir/$name/$name.ino"
            arduino-lint --compliance permissive "$dir/$name" || exit 1
          done
