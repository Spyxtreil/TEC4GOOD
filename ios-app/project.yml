name: TEC4GOOD
options:
  bundleIdPrefix: com.tec4good
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  TEC4GOOD:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TEC4GOOD
        excludes:
          - Info.plist
    resources:
      - path: TEC4GOOD/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tec4good.TEC4GOOD
        GENERATE_INFOPLIST_FILE: YES
        # Info.plist keys generated at build time — no separate file needed.
        INFOPLIST_KEY_CFBundleDisplayName: "TEC4GOOD"
        INFOPLIST_KEY_CFBundleDevelopmentRegion: "es"
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "TEC4GOOD usa Bluetooth para conectarse al sensor de pulso MAX30102 via un ESP32."
        INFOPLIST_KEY_NSBluetoothPeripheralUsageDescription: "TEC4GOOD usa Bluetooth para recibir lecturas de pulso y SpO2 del sensor."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
